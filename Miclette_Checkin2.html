<html lang eng>

<head>
<meta charset="utf-8" />
<title>Miclette Check-In 2</title>

<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"> </script>

<style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; };
</style>

</head>

<body>
<div id="map"></div>

<script>

    //Put your mapbox access token here
    mapboxgl.accessToken = 'pk.eyJ1IjoiaWtlbTk5IiwiYSI6ImNtbHNjMTI4eTA0cDQzZ29tdDIyaHpmOTgifQ.qrMNz0gdBNLxfVnnFIFO4g';  

        // Load a new map in the 'map' HTML div
        var map = new mapboxgl.Map({
            container: 'map', // container id
            style: 'mapbox://styles/ikem99/cmo0a8tkn005801rg7jgq4m6m', // Put your mapbox style ID here
            center: [-118.2437 , 34.0522], // starting position [lng, lat]
            zoom: 6 // starting zoom
        });


        // When loading the map
        map.on('load', function() {


            // Add fault data layers
            map.addLayer({
                'id':'denver_tree_point',
                'type':'circle',
                'source':{
                    type:'vector',
                    url:'ikem99.17sep66n' // After "mapbox://" paste your Mapbox tileset ID
                },
                'source-layer':'wgsqfaults-offshore-california-03-22-2020', // name of tilesets
                'layout':{
                    'visibility': 'visible'
                },
                'paint': {
                    'circle-color':'#86b049',
                    'circle-opacity':1,
                    'circle-stroke-width':0.5,
                    'circle-stroke-color':'white',          //points on the graph
                    'circle-stroke-opacity':0.5,
                    'circle-radius':2
                }
            });
            

        })

</script>

</body>
</html>
